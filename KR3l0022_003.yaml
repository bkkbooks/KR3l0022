body:
  text: 鄭仲賢遺集題緱氏山秋隂漠漠秋雲輕緱氏山頭月正明帝子西飛仙馭逺不知何處夜吹笙送枝江秦長官罷秩衆論才名外新人似古人官嫌容易達家愛等閒貧觧印詩權在移風澤國春政聲交不得慚見故鄉民送曹緯劉鼎二秀才旦夕春風老離心共黯然小舟同笛夜微雨養花天手筆人皆有曹劉世所賢彬侯重才子從此看鶯遷靈泉觀潺湲如繚嶺雲隂玉石魚龍換古今只見開元無事久不知貞觀用功深籠無解語衣無雪堆有黄沙粟有金惆悵胡雛負恩澤如知夷甫少經心讀江總𫝊行人慵過景陽宮宮畔離離禾黍風庭玉有花空怨白井蓮無步莫愁紅吟詩功業才雖大亡國君臣道最同爭怨暮年歸故里綸竿㢠廻避釣魚翁赴闕日過申州經石子鎮驛得罪先朝出粉闈五原功業有誰知年深放逐無人識白雪關頭一坐時以上俱文鑑雷州及海外瓊崖多香木夷民以為槽飼雞犬沈檀香植在天涯賤等荆衡水靣槎何必為槽飼雞犬不如煨燼向豪家談苑郢中寒食訪僧舍題壁客去愁經百五春雨餘溪寺綠無塵金花何處鞦韆鼔粉頸誰家鬭草人水上碧桃流片段梁間歸燕語逡巡髙僧不飲客攜酒來勸先朝放逐臣古今詩話郊居云百草千花路斜風細雨天重經貶所云過關已躍摴蒱馬誤喘猶疑顧兔屏洛城云星沈㑹節歌鐘早天半上陽煙樹微贈張靈州云越絶曉殘蝴蝶夢單于秋引畫龍聲長安送别云杜曲花光濃似酒灞陵春色老於人送人歸湘中云滿帆歸日催行客一夜東風落楚梅南行云失意慣中遷客酒多年不見侍臣花棲靈𨼆寺云舊井霜飄仙界橘雙溪時落海邊鷗永熙陵云承露氣清駒送日觚稜人靜鳥呼風送人知韶州云碧落春風老朱陵古渡頭邊上云髩間相似雪峯外寂寥煙以上俱楊文公談苑裴晉公綠野堂云水暖鳬鷖行哺子溪深桃李臥開花楊公詩話云此一聨最為警絶人謂不減王維杜甫又謂鄭句不獨當時人莫及雖其集中若及此者亦少
