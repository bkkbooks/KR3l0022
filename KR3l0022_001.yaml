body:
  text: 南唐近事卷一宋鄭文寶撰南唐烈祖元宗後主三世共四十年起天福丁酉之春終開寶乙亥之冬君臣用舍朝廷典章兵火之餘史籍蕩盡惜乎前事十不存一余匪鴻儒頗常嗜學耳目所及志於縑緗聊資抵掌之談敢望獲麟之譽好事君子無或陋焉太平興國二年歲次丁丑夏五月一日江表鄭文寶序烈祖輔吳之初未踰强仕元勳碩望足以鎮時靖亂然當時同立功如朱瑾李德誠朱延夀劉信張崇柴載用周本劉金張宣崔太初劉威韋建王綰等皆握强兵分守方面由是朝廷用意牢籠終以跋扈為慮上雖至仁長厚猶以為非老成無以彈壓遂服藥變其髭鬢一夕成霜洎厯數有歸讓皇內禪諸藩入覲竟無異圖烈祖嘗晝寢夢一黃龍繚繞殿檻鱗甲炳煥照耀庭宇殆非常狀逼而視之蜿蜒如故上既寤使視前殿即齊王憑檻而立偵上之安否問其至止時刻及視向背皆符所夢上曰天意諄諄信非偶爾成吾家事其惟此子乎旬月之間遂正儲位齊王即元宗居藩日所封之爵也江都縣大㕔相𫝊有鬼物據之前政令長升之者必為瓦礫所擲或中夜之後毁去案硯或家人暴疾遺火不常斯邑皆相承居小㕔蒞事始獲小康江夢孫聞之嘗憤其說然夢孫儒行正直衆所推服無何自祕書郎出宰是邑下車之日升正㕔受賀訖向夜具香案端笏當中而坐誦周易一遍明日如常理事蔑爾無聞自始來至終考莫覩怪異後之為政者皆飲其惠焉金陵城北有湖周回十數里幕府雞籠二山環其西鍾阜蔣山諸峰聳其左名園勝境掩映如畫六朝舊跡多出其間每嵗菱藕罟網之利不下數十千建康實録所謂𤣥武湖是也一日諸閣老待漏朝堂語及林泉之事坐間馮謐因舉元宗賜賀監三百里鏡湖信為盛事又曰豫非敢望此但賜後湖亦暢豫平生也吏部徐鉉怡聲而對曰主上尊賢待士常若不及豈惜一後湖所之者知章爾馮大有慚色朱鞏侍郎童蒙日在廣陵入學其師甚嚴每朝午歸餐指景為約其時不至當行夏楚朱雖禀師之命然常為里巷中一惡犬當道過輒啅吠鞏乃整衣望犬再拜祈之曰幸無嚙我早入學中免為夫子笞責精誠所至涕泗交流犬亦狂吠不顧是夕犬暴卒於家處士史虛白北海人也清泰中客逰江表卜居於潯陽落星灣遂有終焉之志容貌恢廓髙尚不仕嘗對客奕棋旁令學徒四五輩各秉紙筆先定題目或為書啓表章或詩賦碑頌隨口而書握管者略不停綴數食之間衆製皆就雖不精絶然詞彩磊落㫖趣流暢亦一代不羈之才也晚節放達好乘雙犢板轅挂酒壺於車上山童總角負瓢以隨往來廬阜之間任意所適當時朝士咸所推仰保大末淮甸未寧割江之際虛白乃為割江賦以諷曰舟車有限沿汀島以俱閒魚鱉無知尚交游而不止又賦𨼆士詩云風雨揭却屋渾家醉不知其譏刺時政率皆類此元宗南幸道由蠡澤虛白鶴氅杖藜謁鑾輅於江左元宗駐蹕存問頒之榖帛又知其嗜酒别賜御醖數壺以厚其意也他日病將終謂其子曰皇上賜吾上樽飲之略盡固留一榼藏之於家待吾死日殮以時服置拄杖一條及此酒於棺中葬之足矣四時慎勿享奠有益勞費何利死者吾當不歆矣洎卒家人一遵遺命而其子頓絶時祀每因節序必修奠訖爇紙緡於靈座紙皆不化用意焚之火則自滅遂不復更祭奠矣嚴續相公歌姬唐鎬給事通犀帶皆一代之尤物也唐有慕姬之色嚴有欲帶之心因雨夜相第有呼盧之㑹唐適預焉嚴命出妓解帶較勝於一擲舉座屏氣觀其得失六骰數巡唐彩大勝唐乃酌酒命美人歌一曲以别相君宴罷拉而偕去相君悵然遣之升元初許文武百僚觀內藏隨意取金帛盡重載而去惟蔣廷翊獨持一縑還家餘無所取士君子以是而多之終尚書郎鍾謨性聰敏多記問奏疏理論穎脫時輩自禮部侍郎聘周忤㫖左授耀州典午盛夏之月自周徂秦每見道旁古碑必駐馬歷覽皆默識或止郵亭命筆繕寫一日之行不過數里而已又見一圭首豐碑制度甚廣約其詞㫖不下數千餘字臥諸荒塹之中半為水潦所淹無由披讀謨欣然解衣游泳塹中以手捫揣默記其文志諸紙墨他日徵還重經是路天久不雨無復沈碑之泉乃發笥得舊録本就塹較之無一字差誤馮謐總戎廣陵為周師所陷乃削髮披緇以紿周人將圖間道南歸為識者所擒送至行在時鍾謨亦使周人或譏之曰昔日旌旗擁出坐籌之將今朝毛髮化為行腳之僧世宗甚悅因釋罪歸之終中書侍郎賈崇自統軍拜使相鎮江都周師未及境盡焚其井邑棄壘而渡元宗引見於便殿責其奔潰之由且曰朝野謂卿為賈尉遲朕甚賴卿一旦敵兵未至棄甲宵遁何施面目至此耶崇叩首具陳舒元既叛大軍失律城孤氣寡無數旅之兵以禦要害雖真尉遲亦無所施其勇臣當孥戮惟陛下裁之以忤㫖釋罪長流撫州元宗少躋大位天性謙謹每接臣下恭慎威儀動循禮法雖布素僚友無以加也夏日御小殿欲道服見諸學士必先遣中使數四宣諭或訴以小苦巾裹不及冠褐可乎常目宋齊丘為子嵩李建勳為史館皆不之名也君臣之間待遇之禮率類於此沈彬長者有詩名保大中以尚書郎致仕閒居於江西之髙安三吳侯伯多餉粟帛嘗荷杖郊原手植一樹於平野之間召諸子戒曰異日葬吾此地違之者非人子也居數年彬終諸子將起墳於植樹之所尋有術士語以吉凶事近樹北數尺之地卜葬家人諾之是夕諸子咸夢家君訶責擅移葬地復違吾言禍其至矣詰朝乃依遺命伐樹掘土深丈餘得一石椁工用精妙光潔可鑒蓋上刊八字云開成二年夀椁一所乃舉棺就椁而葬之廣狹之間皆中其度彬第二子道者亦能為詩以色絲繫銅佛像長寸餘懸於襟上衣道士服辟榖隆冬盛夏惟單褐布裙跣足日馳數百里狂率嗜酒罕接人事多往來玉笥浮雲二山林棲野宿不常厥居至今尚在南中人多識之王崇文以舊德殊勳位崇台衮巨鎮名藩節制逮之坐鎮浮競出入三朝喜愠莫形世推名將臨武昌日閲兵於蹴踘場武昌㕔有古屋百餘間久經霖雨一旦而頽出乎不意聲聞數里左右色動心恐惟崇文指縱㸃閲安詳如故亦無所顧問何敬洙善彈射性勇決微時為鄂帥李簡家僮李性嚴毅果於殺戮左右給使之人小有過愆鮮獲全宥何嘗因薄暮與同輩戲於小㕔下有蒼頭取李公所愛硯擎於手中謂諸僮曰誰敢破此何時餘酣乘興厲色而應曰死生有命吾敢碎之乃擲硯於石階之上鏗然毀裂羣豎迸散無敢觀者翊日李衙退視事責碎硯之由主者具以實對李極怒即命擒何以至死不旋踵矣夫人素賢明知何有竒相每曰異日當極貴至是匿何後堂中旬浹之間李怒未解夫人亦不敢救一日李獨坐小㕔有一烏申喙向李而噪其聲甚厲李惡之遂拂衣往後園池亭中烏亦隨其所之呌噪不已命家人多方驅逐略無去意李姓既𥚹急怪怒愈甚顧謂左右曰何敬洙善彈亟召來能斃此畜當釋爾罪何應召而至注丸挾彈精誠中激應弦斃之李佳賞至再遂釋其罪洎成立擢為小校以軍功纍建旌鉞建隆初自江西移鎮鄂渚下車之日小亭中復見一烏顧何而鳴何曰昔日全吾之命得非爾乎乃取食物自置諸掌烏翻然而下食何掌中其後何位至中書令授太師致仕功算崇極時莫與比靈禽之應豈徒然哉馮僎即刑部尚書謐之子也舉進士初年少衆譽籍籍以為平折丹桂秋試之間僎一夕夢登崇孝寺幡剎極髙處打方響先是徐幼文能圓夢遂詣徐請圓之徐曰雖有聲價至下地洎來春僎俄成名於韓熙載榜下或有責徐之言謬者徐曰誠於吾語後當知之放榜數日中書奏主司取士不當遂追榜御試馮果覆落鄧匡圖為海州刺史有野客潘扆謁之鄧不甚禮遇館於外廏忽一日鄧命潘觀獵近郊鄧妻因詣廏中覘扆棲泊之所弊榻莞席竹籠而已籠中有錫彈丸二枚其他一無所有艾夜扆從禽歸啓籠之際忽為嘆駭之聲且曰定為婦人所觸幸吾朝來攝其光鋩不爾斷婦人頸久矣圉人異之乃聞於鄧鄧詰其由室家具以實告鄧頗驚異遂召潘升堂屏左右曰先生其有劒術乎潘曰素所習之鄧曰願先生陳其所妙使某拭目一觀可乎潘曰何不可也明日公當齊戒三日擇近郊平廣之地可試吾術鄧如其約至期命潘聨鑣而出至城東其始潘自懷袖中出二彈丸置掌中俄有氣兩條如白虹之狀微微出指端須臾上接於天若風雨之聲當空而轉又繞鄧之頸左盤右旋千餘匝其勢奔掣其聲錚摐雖震電迅雷無以加也鄧據案危坐喪精褫魄雨汗浹體莫知己身之所從乃稽首祈謝曰先生神術固已知矣幸攝其威靈無相見怖潘笑舉一手二白氣復貫掌中若雲霧之乍收數食間復為二錫彈丸矣鄧自此禮遇彌厚表薦於烈祖納焉其後欲𫝊之於人一夕夢其師怒扆擅泄靈術𫝊非其人隂奪其法既寤不復能劒矣尋病終於紫極宮臨終上言乞桐棺葬於近地後當尸解上從之使中貴人護葬於金波園至保大中元宗命親信發冢觀之骸骨尚在迄無異焉南唐近事卷一
