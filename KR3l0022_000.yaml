body:
  text: 南唐近事小説家類一雜事之屬提要臣等謹案南唐近事一卷宋鄭文寶撰文寶有江表志已著録是書前有自序題太平興國二年丁丑蓋猶未仕宋時所作宋史藝文志作南唐近事集名目小異未詳何據然宋史多舛謬集字蓋誤衍也其體頗近小説疑南唐亡後文寶有志於國史搜采舊聞排纂敘次以朝廷大政入江表志至大中祥符三年乃成其餘叢談瑣事别為緝綴先成此編一為史體一為小説體也中如控鶴致斃一詩先見蜀何光逺鑑戒録乃女冠蔣錬師事而此以為廬山九空使者廟道士似不免於牽合附會又如韓偓依王審知以終未見南唐之平閩乃記其金蓮燭跋事亦失斷限然文寶世仕江南得諸聞見雖浮詞不免而實録終存故馬令陸遊南唐書采用此書幾十之五六則宋人固不廢其説矣書中以慶王宏茂作王宏嚴可求作嚴求劉存中作劉存忠所記姓名多與他書不合又此書之杜業江表志作杜光鄴尤自相違異殆傳抄者有所訛漏不盡舊本歟乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1f9c9533924cb5787944cee68b64bd57896f4243de3e3e0fb735edf50054f4d0
