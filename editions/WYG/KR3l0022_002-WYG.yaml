body:
  text: 南唐近事巻二宋鄭文寶撰進士黄可字不可孤寒朴野深於雅道詩句中多用驢字如獻髙侍郎詩云天下𫝊將舞馬賦門前迎得跨驢賓之𩔖又嘗謁舍人潘佑潘教服槐子云豐肌卻老明旦潘公趨朝天階未曙見槐樹煙霧中有人若􅆐狙之狀追而視之即可也怪問其故乃擁條而對曰昨蒙明公教服槐子法故今日齋戒而掇之潘大噱而去孫晟為尚書郎上賜一宅在鳳臺山西岡壠之間徙居之日群公萃止韓熙載見其門卑巷陋謂孫曰湫隘若此豈稱為相第耶舉坐莫喻其㫖明年孫拜御史大夫旬日之間果正台席昇元格盜物直三緡者處極法廬陵村落間有豪民暑雨初霽曝衣篋於庭中失新潔衾服不少許計其資直不下數十千所居僻逺人罕經行唯一貧人隣垣而已周訪蹤狀必為隣人盜之乃訴於邑邑白郡郡命吏按驗歸罪於貧人詐服為盜詰其贓即言散鬻於市盖不勝捶掠也赴法之日寃聲動人長吏察其詞色似非盜者未即刑戮遂具案聞於朝廷烈祖命員外郎蕭儼覆之儼持法明辨甚有理聲受命之日乃絶葷茹齋戒理棹冥禱神祇晝夜兼行佇雪寃枉至郡之日索案詳約始末迄無他狀儼是夕復焚香于庭稽首冥禱願降儆戒將行大辟翊日天氣融和忽有雷雨自西北起至失物之家震死一牛盡剖其腹腹中得所失衣物乃是為牛所噉猶未消潰遂赦貧民而儼驟獲大用諫議大夫張義方命道士陳友者合還丹於牛頭山頻年未就㑹義方遘疾將卒恨不成九轉之功一旦命子弟發丹竈竈下有巨虺火吻錦鱗蜿蜒其間若為神物護持乃取丹自餌一粒瘖瘂而終當時識者以為氣未盡服之隂者不夀也劉仁贍鎮夀春周師堅壘三戰蹙而不降一夕愛子泛舟於敵境艾夜為小校所擒疑有叛志請於贍贍將行軍法監軍使􅈤救不㢠廻復使馳告其夫人夫人曰某即妾最少子㩦提愛育情若不及奈軍法至重不可私也名義至大不可􅉛也茍屈公議使劉氏之門有不忠之名妾與令公何顔以見三軍遂促令斬之然後成其喪禮戰士無不墮淚髙越燕人也將舉進士文價藹然器宇森挺時人無出其右者鄂帥李公賢之待以殊禮將妻以愛女越竊諭其意因題鷹一絶書於屋壁云雪爪星眸衆鳥歸摩天專待振毛衣虞人莫謾張羅網未肯平原淺草飛遂不吿而去後為范陽王盧文納之為壻與王同歸烈祖累居清顯終禮部侍郎與江文蔚俱以詞賦著名故江南士人言體物者以江髙為稱首焉朱匡業劉存忠雖無勲略然以宿舊嚴整皆處環衞之長劉彦貞夀陽既敗我師屢北京師危之元宗臨軒旰食問其守禦之方匡業對曰時來天地皆同力運去英雄不自由遂忤㫖流撫州存忠在側贊美匡業之言不已流饒州韓寅亮偓之子也嘗為予言偓捐館之日温陵帥開其家藏箱笥頗多而緘鐍甚密人罕見者意其必有珍翫使親信發觀惟得燒殘龍鳳燭金縷紅巾百餘條蠟燭尚新巾香猶鬱有老僕泫然而言曰公為學士日常視草金鑾内殿深夜方還翰苑當時皆宮妓秉燭炬以送公悉藏之自西京之亂得罪南遷十不存一二矣余丱嵗延平家有老尼嘗説斯事與寅亮之言頗同尼即偓之妾云耳張易為太弟賓客方雅真率而好乘醉凌人時論憚之嘗侍宴昭慶宮儲后出所愛玉杯親酌易酒捧翫勤至有不顧之色易張目排座抗音而讓曰殿下輕人重器不止虧損至徳恐乖聖人慈儉之㫖言訖碎玉杯於殿柱一座失色儲后避席而謝之廬山九天使者廟有道士忘其姓名體貌魁偉飲啗酒肉有兼人之量晚節服餌丹砂躁於沖舉魏王之鎮潯陽也郡齋有雙鶴因風所飄憩於道館迴翔嘹唳若自天降道士且驚且喜焚香端簡前瞻雲霓自謂當赴上天之召命山童控而乘之羽儀清弱莫勝其載毛傷背折血洒庭除仰接久之是夕皆斃翌日馴養者詰知其狀訴於公府王不之罪處士陳沆聞之為絶句以諷云啗肉先生欲上昇黄雲踏破紫雲崩龍腰鶴背無多力傳語麻姑借大鵬慶王茂元宗第二子也雅言俊徳宗室罕倫未冠而薨上深軫悼每顧侍臣曰子夏喪明不為異也或對曰臣聞仁而不夀仙經所謂鍊形於太隂之中然慶王必將侍三后於三清友王喬於玉除伏望少寢矜念上泫然焉烈祖輔吳將有禪讓之事人情尚懐彼此一二不樂周宗請之上曰吾夜夢為人引劒斷吾之頸意所惡之宗遽下階拜賀曰當策立耳居數日而内禪王魯為當塗宰頗以資産為務㑹部民連狀訴主簿貪賄於縣尹魯乃判曰汝雖打草吾已虵驚為好事者口實焉鄧亞文髙安鄉野之人也烈祖時自尚書郎拜青陽令升㕔就案而食自謂尊顯彌極還語兒子軰云當思為學自致煙霄吾為百里之長聲鼔喫飯腦後接筆此吾稽古之力也宋齊丘微時相者相之曰君貴不可說然亞夫下獄之相君實有之位極之日當早引退庶㡬保全齊丘登相位數載致仕復以大司徒就徵保大末坐陳覺謀干犯事乃餓死於青陽元宗幼學之年馮權常給使左右上深所親倖每曰我富貴之日為爾置銀靴焉保大初聽政之暇命親王及東宮舊僚擊鞠歡極頒賚有等語及前事即日賜銀三十觔以代銀靴權遂命工鍛靴穿焉人皆哂之元宗嗣位之初春秋鼎盛留心内寵宴私擊鞠略無虚日常乘醉命樂工楊花飛奏水調詞進酒花飛唯歌南朝天子好風流一句如是者數四上既悟覆盃大懌厚賜金帛以旌敢言上曰使孫陳二主得此一句固不當有銜璧之辱也翌日罷諸懽宴留心庶事圖閩弔楚㡬致治平常夢錫為翰林學士剛直不附貴近側目或謂曰公罷直私門何以為樂常曰垂幃痛飲面壁而已蓋馮魏擅權之際也周業為左街使信州刺史本之子也與劉郎素有隙劉郎長公主壻時為禁帥無何昇元中金陵告災業方潛飲人家醉不能起有聞上者上顧親信施仁望曰率衞士十人詣災所見其馳救則釋不然就戮於牀仁望既往亟使召業家語之業大怖衣女子服奔見仁望仁望怒之洎火息復命至便殿門㑹劉郎先至亦將白災事仁望揣劉意不能蔽業又懼與之偕罪計出倉卒遽排劉越次見上曰火不為災業誠如聖㫖上曰戮之乎仁望曰業父本方臨敵境臣未敢即時奉詔上撫几大悅曰㡬誤我事仁望自此大獲奬用業乃全恕陳誨耆鴿馴養千餘隻誨自南劒牧拜建州觀察使去郡前一月群鴿先之富沙舊所無孑遺矣又嘗因早衙有一鴿投誨之懐袖中為鷹鸇所擊故也誨感之自是不復食鴿矣章齊一為道士滑稽無度善於嘲毀娼里樂籍多稱其詞弟曰齊二次曰齊三保大中任樂坊判官一旦暴疾齊一齚舌而終女冠耿先生鳥爪玉貌甚有道術獲寵於元宗將誕前三日謂左右曰我子非常産之夕當有異及他夕果震雷繞室大雨河傾半夜雷止耿身不復孕左右莫知所産將子亦隨失矣陳繼善自江寧尹拜少傅致仕富於資産性鄙屑别墅林池未嘗暫適既不嗜學又杜絶賓客惟自荷一鋤理小圃成畦以真珠千餘顆若種蔬狀布土壤之間記顆俯拾周而復始以此為樂焉烈祖鎮建業日義祖薨於廣陵致意將有奔喪之計康王已下諸公子謂周宗曰幸聞兄長家國多事宜抑情損禮無勞西渡也宗度王等非本意堅請報簡示信於烈祖康王以匆遽為詞宗袖中出筆復為左右取紙得故茗紙帖為手札康王不獲已而札曰幸就東府舉哀多壘之秋二兄無以奔喪為念也明年烈祖朝覲廣陵康王及諸公子果執上手大慟誣上不以臨喪為意詛讓百端冀動物聽上因出王所書以示之王靦顔而已兵部尚書杜業任樞密有權變足機㑹兵賦民籍指之掌中其妻張氏妬悍尤急室絶婢妾業憚之如事嚴親烈祖嘗命元皇后召張至内庭誡之曰業位望通顯得置妾媵何拘忌如此豈婦道所宜耶張雪涕而言曰業本狂生遭逢始運多壘之初陛下所藉者駑馬未竭耳而又早衰多病縱之必貽其患將誤於任使耳烈祖聞之大加奬嘆以銀盆綵段賞之烈祖輔吳四方多壘雖一騎一卒必加姑息以群校多從禽聚飲近野或騷擾民庶上欲繩之以法而方藉其材力思得酌中之計問於嚴求求曰無煩繩之易絶耳請勅泰興海鹽諸縣罷採鷹鸇可不令而止烈祖從其計朞月之間群校無復游墟落者嚴求微時為陽邑吏陽宰器之待以賓禮每曰卿當自愛他日極人臣之位吾不復見卿之貴幸以遺孤留意期年嚴亟登公輔宰歿既久其子理遺命候謁嚴門嚴贈擔石束帛而已其子慊懐而退嚴不甚顧密遣家人齎黄金數十觔伺於逆旅間謝之曰非陽宰之子乎相君使奉金以備行李又薦一官地宅僕馬畢為之置其子他日及門致謝嚴曰聊以報尊府君平昔之遇耳一見後終身謝絶焉烈祖輔吳日與諸侯㑹射延賓亭劉信擎牙注矢揖擬四座小校孫漢威疑不利於上忽引身障烈祖以己當之上自此益加寵遇位至侍中九江帥劉信攻南康終月不下義祖譴信使者而杖之詈曰語劉信要背即背何疑之甚也信聞命大怖并力急攻次宿而下凱旋之日師至新林浦犒錫不至亦無所存勞他日謁見義祖命諸元勲為六博之戲以紓前意信酒酣掬六骰於手曰令公疑信欲背者傾西江之水終難自滌不負公當一擲徧赤誠如前㫖則衆彩而已信當自拘不煩刑吏耳義祖免釋不暇投之於盆六子皆赤義祖賞其精誠昭感復待以忠貞焉李建勲鎮臨川方與僚屬㑹飲郡齋有送九江帥周宗書至者訴以赴鎮日近器用儀注或闕求輟於臨川李無復報簡但乘醉大批其書一絶云偶罷阿衡來此郡固無閒物可應官憑君為報群胥道莫作循州刺史看趙王李徳誠鎮江西有日者自稱世人貴賤一見輒分王使女妓數人與其妻滕國君同糚梳服飾偕立庭中請辨良賤客俯躬而進曰國君頭上有黄雲群妓不覺仰首日者曰此是國君也王悅而遣之陳覺微時為宋齊丘之客及為兵部侍郎也其妻李氏妬悍親執厨爨不置妾媵齊丘選姿美之婢三人與之李亦無難色奉侍三婢若舅姑禮問其故李曰此令公寵倖之人見之若面令公何敢倨慢三婢既不自安求還宋第宋咲而許之馮延巳鎮臨川聞朝議已有除替一夕夢通舌生毛翊日有僧解之曰毛生舌間不可剃也相公其未替乎旬日之間果已寢命張洎計偕之嵗為潤帥燕王冀所薦首謁韓熙載韓一見待之如故謂曰子好一中書舍人頃之韓主文洎擢第不十年果主綸闈之任進士李冠子善吹中管妙絶當代上饒郡公嘗聞於元宗上甚欲召對屬淮甸多故盤桓朞月戎務日繁竟不獲見出關日李建勲贈一絶云韻如古澗長流水怨似秋枝欲斷蟬可惜人間容易聽新聲不到御樓前鍾傳鎮江西日客有以覆射之法求謁𫝊以厯日包一橘置袖中使射中客口占一歌以揭之云太嵗當頭立諸神莫敢當其中有一物常帶洞庭香程員舉進士將逼試夜夢烏衣吏及門告員曰君與王倫廖衢陳度魏清並已及第員夢中驚喜理服馳馬詣省門見楊遂張觀曾顗立街中謂曰榜在雞行何忽至此員悵然而覺秘不敢言其年考功員外郎張秘權知貢舉果放楊遂等三人員輩卒無徵應既夏内降御札尚慮遺賢命張洎舍人取所試詩賦就中書重定務在精選洎果取員等五人附來春别榜及第明年嵗在癸酉也李徳來任大理少卿持法甚峻忌刻便佞時號李猫兒本無學術詐稱博聞每呼馬為韓盧樂工為伶倫諂佞為謇諤以此貽譏於世木平和尚不知何許人也保大初徵至闕下傾都瞻禮闐咽里巷金帛之施日積數萬嘗出入宮禁中他日從上登百尺樓上曰新建此樓制度佳否木平曰尤宜望火上初不喻其㫖居數嵗木平卒淮甸大擾自夀陽置烽堠以應龍安山旦夕上多登覽以瞻動靜又上最鍾愛慶王王初㓜學上問夀命㡬何木平曰郎君聰明哲智預知六十年事夀當七十是嵗疾終年十七盖反語以對之也李徵古宜春人也少時賤逰嘗宿同郡潘長史家是夜潘妻夢門前有儀注鞍馬擁劒􅀈䤪衙隊約二百人或坐或立且云太守在此洎見乃寓宿秀才覺後言於潘曰此客非常人也妾來晨略見餞酒一鍾贈之金枙腕曰郎君他日富貴慎勿相忘李不可知也來年至京一舉成名不二十年自樞密副使除本州刺史離闕日元宗賜内庫酒二百瓶韓熙載放曠不羈所得俸錢即為諸姬分去乃著衲衣負筐命門生舒雅執手版於諸姬院乞食以為笑樂使中國作詩云我本江北人去作江南客舟到江北來舉目無相識不如歸去來江南有人憶陶榖學士奉使恃上國勢下視江左辭色毅然不可犯韓熙載命妓秦弱蘭詐為驛卒女每日弊衣持帚掃地陶悅之與狎因贈一詞名風光好云好因緣惡因緣只得郵亭一夜眠别神仙琵琶撥盡相思調知音少待得鸞膠續斷絃是何年明日後主設宴陶辭色如前乃命弱蘭歌此詞勸酒陶大沮即日北歸韓熙載北人仕江南致位通顯不防閑婢妾有北齊徐之才風侍兒往往私客客賦詩有云最是五更留不住向人枕畔著衣裳之句熙載亦不介意南唐近事巻二
